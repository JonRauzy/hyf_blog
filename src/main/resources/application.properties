spring.application.name=hyf_blog

spring.config.import=optional:file:env.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT secret — Base64-encoded. Decoded value: "this-is-the-secret-key-used-to-sign-jwt-tokens-keep-it-safe"
# In production, set the JWT_SECRET environment variable instead (README40: never commit real secrets)
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy10aGUtc2VjcmV0LWtleS11c2VkLXRvLXNpZ24tand0LXRva2Vucy1rZWVwLWl0LXNhZmU=}
#app.jwt.secret=${JWT_SECRET:this-is-the-secret-key-used-to-sign-jwt-tokens-keep-it-safe}

app.jwt.expiration=900000
# Refresh token expiration: 7 days in milliseconds (7 * 24 * 60 * 60 * 1000)
# Much longer than the access token — the user stays "logged in" across sessions
app.jwt.refresh-expiration=604800000