spring.application.name=hyf_blog

spring.config.import=optional:file:env.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET}

app.jwt.expiration=604800000
# Refresh token expiration: 7 days in milliseconds (7 * 24 * 60 * 60 * 1000)
# Much longer than the access token — the user stays "logged in" across sessions
app.jwt.refresh-expiration=900000
